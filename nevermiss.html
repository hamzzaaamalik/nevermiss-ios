    function App() {
      const [mode, setMode] = useState("onboarding");
      const [phaseIntro, setPhaseIntro] = useState(null);
      const [showPhaseCards, setShowPhaseCards] = useState(
        () => localStorage.getItem("nevermiss_phase_cards") !== "off"
      );
      const shownThisSession = useRef(new Set());
      const handleTogglePhaseCards = () => {
        const next = !showPhaseCards;
        localStorage.setItem("nevermiss_phase_cards", next ? "on" : "off");
        setShowPhaseCards(next);
      };
      const handleDisablePhaseCards = () => {
        if (phaseIntro) localStorage.setItem(`nevermiss_card_skip_${phaseIntro}`, "yes");
        setPhaseIntro(null);
      };
      useEffect(() => {
        const handler = () => setShowPhaseCards(localStorage.getItem("nevermiss_phase_cards") !== "off");
        window.addEventListener("storage", handler);
        return () => window.removeEventListener("storage", handler);
      }, []);
      useEffect(() => {
        if (showPhaseCards && PHASE_INTROS[mode]) {
          const skipped = localStorage.getItem(`nevermiss_card_skip_${mode}`) === "yes";
          const alreadyShown = shownThisSession.current.has(mode);
          if (!skipped && !alreadyShown) {
            shownThisSession.current.add(mode);
            setPhaseIntro(mode);
          }
        }
      }, [mode, showPhaseCards]);
      const [nanaOnboardingStep, setNanaOnboardingStep] = useState(0);
      const [perryOnboardingStep, setPerryOnboardingStep] = useState(0);
      const [nanaDisplayName, setNanaDisplayName] = useState("Nana");
      const [inviteToken, setInviteToken] = useState("");
      const [connectionId, setConnectionId] = useState(null);
      const [authError, setAuthError] = useState("");
      const [authLoading, setAuthLoading] = useState(false);
      const [perryInviteError, setPerryInviteError] = useState("");
      const [perryLookupNanaName, setPerryLookupNanaName] = useState("");

      // Device view: null = splash, "nana" = Nana only, "perry" = Perry only, "both" = demo side-by-side
      const [deviceView, setDeviceView] = useState(() => {
        try { return localStorage.getItem("nm_device_view") || null; } catch { return null; }
      });
      const handleSelectDevice = (view) => {
        try {
          if (view === "both") localStorage.removeItem("nm_device_view");
          else localStorage.setItem("nm_device_view", view);
        } catch {}
        setDeviceView(view);
      };
      const handleSwitchDevice = () => {
        try { localStorage.removeItem("nm_device_view"); } catch {}
        setDeviceView(null);
      };

      // Perry PIN login state — lazy-init from localStorage so returning Perry sees PIN screen instantly (no flash)
      const perryConnRef_init = (() => { try { const s = localStorage.getItem("nm_perry_conn"); return s ? JSON.parse(s) : null; } catch { return null; } })();
      const [perryPinMode, setPerryPinMode] = useState(() => !!localStorage.getItem("nm_perry_conn"));
      const [perryAuthenticated, setPerryAuthenticated] = useState(false);
      const [perryPinChildName, setPerryPinChildName] = useState(() => perryConnRef_init?.childName || "");
      const [perryPinError, setPerryPinError] = useState("");
      const [perryPinLoading, setPerryPinLoading] = useState(false);
      const sseRef = useRef(null);
      const nanaSseRef = useRef(null);
      const [fontScale, setFontScale] = useState(() => {
        const s = localStorage.getItem("nm_font_scale");
        return s ? Number(s) : 1;
      });
      const cycleFontScale = () => {
        setFontScale(prev => {
          const next = prev >= 1.5 ? 1 : prev >= 1.25 ? 1.5 : 1.25;
          localStorage.setItem("nm_font_scale", String(next));
          if (connectionId) {
            apiCall(`/sessions/${connectionId}/event`, { method: "POST", body: JSON.stringify({ type: "font_change", payload: { scale: next } }) }).catch(() => {});
          }
          return next;
        });
      };
      const perryConnRef = useRef(null);

      // Nana connection dashboard
      const [dashboardLoading, setDashboardLoading] = useState(false);
      const [dashboardPerryName, setDashboardPerryName] = useState("");
      const [dashboardProgress, setDashboardProgress] = useState([]);

      // On mount: detect returning Perry device
      useEffect(() => {
        try {
          const saved = localStorage.getItem("nm_perry_conn");
          if (saved) {
            const parsed = JSON.parse(saved);
            perryConnRef.current = parsed;
            setConnectionId(parsed.connectionId);
            setNanaDisplayName(parsed.nanaName || "Nana");
            setPerryPinChildName(parsed.childName || "Perry");
            setPerryPinMode(true);
          }
        } catch {}
      }, []);

      // SSE cleanup on unmount
      useEffect(() => {
        return () => { if (sseRef.current) { sseRef.current.close(); sseRef.current = null; } };
      }, []);

      const apiCall = async (path, opts = {}) => {
        const res = await fetch(`/api${path}`, { headers: { "Content-Type": "application/json" }, credentials: "include", ...opts });
        const json = await res.json();
        if (!res.ok) throw new Error(json.error || json.message || "Request failed");
        return json;
      };

      const handleNanaAuth = async (isLogin, data) => {
        setAuthLoading(true); setAuthError("");
        try {
          let user;
          if (isLogin) {
            const res = await apiCall("/auth/login", { method: "POST", body: JSON.stringify({ email: data.email, password: data.password }) });
            user = res.user;
          } else {
            const res = await apiCall("/auth/register", { method: "POST", body: JSON.stringify({ firstName: data.firstName, lastName: data.lastName, displayName: data.displayName, email: data.email, password: data.password, role: "nana" }) });
            user = res.user;
          }
          setNanaDisplayName(user.displayName || user.firstName);

          if (isLogin) {
            // On login, reuse existing connections rather than creating a new one every time
            try {
              const connsRes = await apiCall("/connections");
              const active = connsRes.connections.find(c => c.connection.status === "active");
              const pending = connsRes.connections.find(c => c.connection.status === "pending");
              const existing = active ?? pending;
              if (existing) {
                setConnectionId(existing.connection.id);
                setInviteToken(existing.connection.inviteToken);
                setNanaOnboardingStep(existing.connection.status === "active" ? 3 : 2);
                return;
              }
            } catch (_) {}
          }

          const invRes = await apiCall("/connections/invite", { method: "POST" });
          setInviteToken(invRes.inviteToken);
          setConnectionId(invRes.connection.id);
          setNanaOnboardingStep(1);
        } catch (err) {
          const msg = err.message || "Something went wrong. Please try again.";
          setAuthError(msg.toLowerCase().includes("already exists") ? "That email is already registered. Use the Log In tab instead." : msg);
        } finally { setAuthLoading(false); }
      };

      const handleNanaCodeSent = () => setNanaOnboardingStep(2);

      const handlePerryCodeSubmit = async (code) => {
        setAuthLoading(true); setPerryInviteError("");
        try {
          const res = await apiCall(`/connections/lookup/${code}`);
          setPerryLookupNanaName(res.nanaName);
          setConnectionId(res.connectionId);
          setNanaDisplayName(res.nanaName);
          if (res.needsPin) {
            perryConnRef.current = { connectionId: res.connectionId, childName: "", nanaName: res.nanaName };
            setPerryPinMode(true);
          } else {
            setPerryOnboardingStep(1);
          }
        } catch (err) {
          setPerryInviteError(err.message || "Code not found. Double-check with your grandparent!");
        } finally { setAuthLoading(false); }
      };

      const handleChildProfileConfirm = async (name, birthday, pin) => {
        if (!connectionId) return;
        setAuthLoading(true);
        try {
          await apiCall("/children", { method: "POST", body: JSON.stringify({ connectionId, name, birthday, pin }) });
          const connData = { connectionId, childName: name, nanaName: nanaDisplayName };
          localStorage.setItem("nm_perry_conn", JSON.stringify(connData));
          perryConnRef.current = connData;
          startPerrySSE(connectionId);
          setPerryAuthenticated(true);
          setPerryOnboardingStep(2);
          setNanaOnboardingStep(3);
        } catch (err) {
          setPerryInviteError(err.message || "Couldn't save profile. Please try again.");
        } finally { setAuthLoading(false); }
      };

      const startPerrySSE = (connId) => {
        if (sseRef.current) { sseRef.current.close(); sseRef.current = null; }
        const es = new EventSource(`/api/sessions/${connId}/stream`, { withCredentials: true });
        es.onmessage = (e) => {
          try {
            const data = JSON.parse(e.data);
            if (data.type === "session_started") { setMode("icebreaker"); }
            else if (data.type === "book_change") {
              if (data.payload?.bookId) setSelectedBookId(data.payload.bookId);
              if (data.payload?.page != null) { setChildPage(data.payload.page); childPageRef.current = data.payload.page; }
            }
            else if (data.type === "page_change" && data.payload?.page != null) {
              const pg = Number(data.payload.page);
              setFlipDirection(pg > childPageRef.current ? "forward" : "backward");
              setFlipFromPage(childPageRef.current);
              setFlipToPage(pg);
              setChildFlipping(true);
              setTimeout(() => { setChildPage(pg); childPageRef.current = pg; setChildFlipping(false); }, 680);
            } else if (data.type === "current_state") {
              if (data.payload?.mode) setMode(data.payload.mode);
              if (data.payload?.bookId) setSelectedBookId(data.payload.bookId);
              if (data.payload?.page != null) { setChildPage(data.payload.page); childPageRef.current = data.payload.page; }
            } else if (data.type === "phase_change" && data.payload?.mode) {
              setMode(data.payload.mode);
            } else if (data.type === "font_change" && data.payload?.scale != null) {
              const scale = Number(data.payload.scale);
              setFontScale(scale);
              localStorage.setItem("nm_font_scale", String(scale));
            } else if (data.type === "session_end") {
              setMode("familystories");
            } else if (data.type === "schedule_proposal") {
              const date = new Date(data.payload.date);
              setScheduleProposal({ date, time: data.payload.time, proposedBy: "nana" });
            } else if (data.type === "challenge_state") {
              if (!challengeHostRef.current) {
                setSillyChallenge(data.payload.state);
                if (data.payload.countNum != null) setSillyCountNum(data.payload.countNum);
              }
            } else if (data.type === "silly_filter") {
              if (data.payload.who === "nana") setNanaSillyFilter(data.payload.filter);
              else if (data.payload.who === "perry") setPerrySillyFilter(data.payload.filter);
            } else if (data.type === "laugh_winner") {
              setLaughWinner(data.payload.who);
            } else if (data.type === "toggle_child_prompts") {
              setShowChildIcebreakerPrompts(data.payload.show);
            } else if (data.type === "goodbye_start") {
              const startTime = data.payload.startTime;
              setGoodbyeStartTime(startTime);
              setGoodbyePhase(0);
              setMode("goodbye");
            } else if (data.type === "goodbye_phase") {
              setGoodbyeStartTime(null);
              setGoodbyePhase(data.payload.phase);
            }
          } catch {}
        };
        es.onerror = () => {};
        sseRef.current = es;
      };

      const startNanaSSE = (connId) => {
        if (nanaSseRef.current) { nanaSseRef.current.close(); nanaSseRef.current = null; }
        const es = new EventSource(`/api/sessions/${connId}/stream`, { withCredentials: true });
        es.onmessage = (e) => {
          try {
            const data = JSON.parse(e.data);
            if (data.type === "phase_change" && data.payload?.mode) {
              setMode(data.payload.mode);
            } else if (data.type === "schedule_accept") {
              setPerryScheduleAccepted(true);
            } else if (data.type === "challenge_state") {
              if (!challengeHostRef.current) {
                setSillyChallenge(data.payload.state);
                if (data.payload.countNum != null) setSillyCountNum(data.payload.countNum);
              }
            } else if (data.type === "silly_filter") {
              if (data.payload.who === "nana") setNanaSillyFilter(data.payload.filter);
              else if (data.payload.who === "perry") setPerrySillyFilter(data.payload.filter);
            } else if (data.type === "laugh_winner") {
              setLaughWinner(data.payload.who);
            }
          } catch {}
        };
        es.onerror = () => {};
        nanaSseRef.current = es;
      };

      const handlePerryPinLogin = async (pin) => {
        setPerryPinError(""); setPerryPinLoading(true);
        try {
          const connId = perryConnRef.current?.connectionId || connectionId;
          const res = await apiCall("/children/pin-login", { method: "POST", body: JSON.stringify({ connectionId: connId, pin }) });
          setNanaDisplayName(res.nanaName || "Nana");
          setConnectionId(res.connectionId || connId);
          setPerryPinMode(false);
          setPerryAuthenticated(true);
          setPerryOnboardingStep(2);
          startPerrySSE(res.connectionId || connId);
        } catch (err) {
          setPerryPinError(err.message || "Wrong PIN. Try again!");
        } finally { setPerryPinLoading(false); }
      };

      // Nana polling — auto-advance when Perry joins
      useEffect(() => {
        if (nanaOnboardingStep !== 2 || !connectionId) return;
        const poll = setInterval(async () => {
          try {
            const res = await apiCall(`/connections/${connectionId}/status`);
            if (res.status === "active") {
              clearInterval(poll);
              setNanaOnboardingStep(3);
            }
          } catch {}
        }, 3000);
        return () => clearInterval(poll);
      }, [nanaOnboardingStep, connectionId]);

      // Fetch dashboard data when Nana reaches step 3
      useEffect(() => {
        if (nanaOnboardingStep !== 3 || !connectionId) return;
        setDashboardLoading(true);
        Promise.all([
          apiCall(`/children/${connectionId}`),
          apiCall(`/progress/${connectionId}`),
        ]).then(([children, progressRes]) => {
          if (children.length > 0) setDashboardPerryName(children[0].name);
          setDashboardProgress(progressRes.progress || []);
        }).catch(() => {}).finally(() => setDashboardLoading(false));
      }, [nanaOnboardingStep, connectionId]);

      const handleBeginSession = () => {
        if (connectionId) {
          apiCall(`/sessions/${connectionId}/event`, { method: "POST", body: JSON.stringify({ type: "session_started", payload: {} }) }).catch(() => {});
          startNanaSSE(connectionId);
        }
        setShowChildIcebreakerPrompts(false);
        setMode("icebreaker");
      };
      const handleSkipOnboarding = () => setMode("icebreaker");
      const handleNanaBack = () => setNanaOnboardingStep(s => Math.max(0, s - 1));
      const handlePerryBack = () => {
        if (perryOnboardingStep === 1) {
          setPerryOnboardingStep(0); setNanaOnboardingStep(2); setPerryInviteError(""); setPerryLookupNanaName("");
        } else { setPerryOnboardingStep(s => Math.max(0, s - 1)); }
      };
      const [promptIndex, setPromptIndex] = useState(0);
      const [childPromptIndex, setChildPromptIndex] = useState(0);
      const [showChildIcebreakerPrompts, setShowChildIcebreakerPrompts] = React.useState(false);
      const [showAndTellPromptIndex, setShowAndTellPromptIndex] = useState(0);
      const [nanaPage, setNanaPage] = useState(1);
      const [childPage, setChildPage] = useState(1);
      const [childFlipping, setChildFlipping] = useState(false);
      const [flipFromPage, setFlipFromPage] = useState(1);
      const [flipToPage, setFlipToPage] = useState(1);
      const [flipDirection, setFlipDirection] = useState("forward");
      const [busy, setBusy] = useState(false);
      const timerRef = useRef(null);
      const childPageRef = useRef(1);
      const sessionStartPageRef = useRef(1);

      const [selectedBookId, setSelectedBookId] = useState("alice");
      const currentBook = booksLibrary[selectedBookId];

      const [nanaSillyFilter, setNanaSillyFilter] = useState("none");
      const [perrySillyFilter, setPerrySillyFilter] = useState("none");
      const [sillyChallenge, setSillyChallenge] = useState("idle");
      const [sillyCountNum, setSillyCountNum] = useState(3);
      const [laughWinner, setLaughWinner] = useState(null);
      const challengeHostRef = React.useRef(false);

      useEffect(() => {
        if (sillyChallenge === "idle") { challengeHostRef.current = false; return; }
        if (!challengeHostRef.current) return;
        const pub = (state, countNum) => {
          if (connectionId) apiCall(`/sessions/${connectionId}/event`, { method: "POST", body: JSON.stringify({ type: "challenge_state", payload: { state, ...(countNum != null ? { countNum } : {}) } }) }).catch(() => {});
        };
        if (sillyChallenge === "counting") {
          if (sillyCountNum > 1) {
            const next = sillyCountNum - 1;
            const t = setTimeout(() => { setSillyCountNum(next); pub("counting", next); }, 900);
            return () => clearTimeout(t);
          } else {
            const t = setTimeout(() => { setSillyChallenge("flash"); pub("flash"); }, 900);
            return () => clearTimeout(t);
          }
        }
        if (sillyChallenge === "flash") {
          const t = setTimeout(() => { setSillyChallenge("holding"); pub("holding"); }, 450);
          return () => clearTimeout(t);
        }
        if (sillyChallenge === "holding") {
          const t = setTimeout(() => { setSillyChallenge("result"); pub("result"); }, 6000);
          return () => clearTimeout(t);
        }
      }, [sillyChallenge, sillyCountNum, connectionId]);

      const handleStartChat = () => setMode("chat");
      const handleStartReading = () => setMode("library");
      const handleSelectBook = (id) => setSelectedBookId(id);
      const handleConfirmBook = (startPage = 1) => {
        sessionStartPageRef.current = startPage;
        setNanaPage(startPage);
        setChildPage(startPage);
        setMode("reading");
        if (connectionId) {
          apiCall(`/sessions/${connectionId}/event`, { method: "POST", body: JSON.stringify({ type: "book_change", payload: { bookId: selectedBookId, page: startPage } }) }).catch(() => {});
        }
      };
      const handleOpenVault   = () => setMode("vault");
      const handleCloseVault  = () => setMode("icebreaker");
      const handleStartShowAndTell = () => { setShowAndTellPromptIndex(0); setMode("showandtell"); };
      const handleNextPrompt = () => setPromptIndex(i => (i + 1) % icebreakerPrompts.length);
      const handleNextChildPrompt = () => setChildPromptIndex(i => (i + 1) % childIcebreakerPrompts.length);
      const handleNextShowAndTellPrompt = () => setShowAndTellPromptIndex(i => (i + 1) % showAndTellPrompts.length);
      const handleBackToReading = () => setMode("reading");
      const handleStartParentCheck = () => { setNanaSillyFilter("none"); setPerrySillyFilter("none"); setSillyChallenge("idle"); setLaughWinner(null); setMode("parentcheck"); };
      const handleStartSillyFaces  = () => setMode("sillyfaces");
      const handleSetNanaFilter = (f) => {
        setNanaSillyFilter(f);
        if (connectionId) apiCall(`/sessions/${connectionId}/event`, { method: "POST", body: JSON.stringify({ type: "silly_filter", payload: { who: "nana", filter: f } }) }).catch(() => {});
      };
      const handleSetPerryFilter = (f) => {
        setPerrySillyFilter(f);
        if (connectionId) apiCall(`/sessions/${connectionId}/event`, { method: "POST", body: JSON.stringify({ type: "silly_filter", payload: { who: "perry", filter: f } }) }).catch(() => {});
      };
      const handleStartChallenge = () => {
        challengeHostRef.current = true;
        setSillyChallenge("counting"); setSillyCountNum(3); setLaughWinner(null);
        if (connectionId) apiCall(`/sessions/${connectionId}/event`, { method: "POST", body: JSON.stringify({ type: "challenge_state", payload: { state: "counting", countNum: 3 } }) }).catch(() => {});
      };
      const handleLaughedFirst = (who) => {
        setLaughWinner(who);
        if (connectionId) apiCall(`/sessions/${connectionId}/event`, { method: "POST", body: JSON.stringify({ type: "laugh_winner", payload: { who } }) }).catch(() => {});
      };
      const handleBackFromSillyFaces = () => { setGoodbyePhase(0); setMode("goodbye"); };

      const [goodbyePhase, setGoodbyePhase] = useState(0);
      const [goodbyeStartTime, setGoodbyeStartTime] = useState(null);

      // ── Shared scheduling state ──
      const [scheduleProposal, setScheduleProposal] = useState(null);
      const [nanaScheduleAccepted, setNanaScheduleAccepted] = useState(false);
      const [perryScheduleAccepted, setPerryScheduleAccepted] = useState(false);
      const handlePropose = (date, time, by) => {
        setScheduleProposal({ date, time, proposedBy: by });
        if (by === "nana") {
          setNanaScheduleAccepted(true);
          if (connectionId) {
            apiCall(`/sessions/${connectionId}/event`, { method: "POST", body: JSON.stringify({ type: "schedule_proposal", payload: { date: date.toISOString(), time } }) }).catch(() => {});
          }
        } else {
          setPerryScheduleAccepted(true);
        }
      };
      const handleNanaAccept  = () => setNanaScheduleAccepted(true);
      const handlePerryAccept = () => {
        setPerryScheduleAccepted(true);
        if (connectionId) {
          apiCall(`/sessions/${connectionId}/event`, { method: "POST", body: JSON.stringify({ type: "schedule_accept", payload: { by: "perry" } }) }).catch(() => {});
        }
      };

      // Self-timing goodbye: one event with timestamp, both devices run local timer
      const GOODBYE_PHASE_DURATIONS = [2000, 2000, 2000, 2000, 2000, 3000, 2500];
      useEffect(() => {
        if (mode !== "goodbye" || goodbyeStartTime === null) return;
        let cumulative = 0;
        const thresholds = GOODBYE_PHASE_DURATIONS.map(d => { cumulative += d; return cumulative; });
        const tick = () => {
          const elapsed = Date.now() - goodbyeStartTime;
          const phase = thresholds.findIndex(t => elapsed < t);
          setGoodbyePhase(phase === -1 ? 7 : phase);
        };
        tick();
        const interval = setInterval(tick, 150);
        return () => clearInterval(interval);
      }, [mode, goodbyeStartTime]);
      const handleStartGoodbye  = () => {
        const startTime = Date.now();
        setGoodbyeStartTime(startTime);
        setGoodbyePhase(0);
        setMode("goodbye");
        if (connectionId) apiCall(`/sessions/${connectionId}/event`, { method: "POST", body: JSON.stringify({ type: "goodbye_start", payload: { startTime } }) }).catch(() => {});
      };
      const handleSkipToGoodbye = () => {
        setGoodbyeStartTime(null);
        setGoodbyePhase(7);
        if (connectionId) apiCall(`/sessions/${connectionId}/event`, { method: "POST", body: JSON.stringify({ type: "goodbye_phase", payload: { phase: 7 } }) }).catch(() => {});
      };

      const [nanaConsentSeen, setNanaConsentSeen] = useState(false);
      const [childConsentSeen, setChildConsentSeen] = useState(false);
      const [nanaRecordingOn, setNanaRecordingOn] = useState(true);
      const [childRecordingOn, setChildRecordingOn] = useState(true);
      const isRecording = nanaConsentSeen && childConsentSeen && nanaRecordingOn && childRecordingOn;


      const resetToHome = () => {
        setMode("icebreaker");
        setGoodbyePhase(0);
        setNanaPage(1);
        setChildPage(1);
        setNanaConsentSeen(false);
        setChildConsentSeen(false);
        setScheduleProposal(null);
        setNanaScheduleAccepted(false);
        setPerryScheduleAccepted(false);
      };
      const handleEndSession = () => {
        if (connectionId && selectedBookId && nanaPage > 1) {
          apiCall(`/session-log/${connectionId}`, {
            method: "POST",
            body: JSON.stringify({ bookId: selectedBookId, startPage: sessionStartPageRef.current, endPage: nanaPage }),
          }).catch(() => {});
        }
        if (connectionId) {
          apiCall(`/sessions/${connectionId}/event`, { method: "POST", body: JSON.stringify({ type: "session_end", payload: {} }) }).catch(() => {});
        }
        setFamilyStoriesSubMode("write");
        setMode("familystories");
      };

      const changePage = (newPage) => {
        if (newPage < 1 || newPage > currentBook.pages.length || busy) return;
        setBusy(true);
        setNanaPage(newPage);
        const dir = newPage > childPageRef.current ? "forward" : "backward";
        if (connectionId) {
          apiCall(`/sessions/${connectionId}/event`, { method: "POST", body: JSON.stringify({ type: "page_change", payload: { page: newPage } }) }).catch(() => {});
        }
        setFlipDirection(dir);
        setFlipFromPage(childPageRef.current);
        setFlipToPage(newPage);
        setChildFlipping(true);
        timerRef.current = setTimeout(() => { setChildPage(newPage); childPageRef.current = newPage; setChildFlipping(false); setBusy(false); }, 680);
      };

      // Publish phase changes so Perry's device follows Nana
      useEffect(() => {
        const phaseChangeEvents = ["icebreaker","reading","library","showandtell","parentcheck","sillyfaces","goodbye"];
        if (!connectionId || !phaseChangeEvents.includes(mode)) return;
        apiCall(`/sessions/${connectionId}/event`, { method: "POST", body: JSON.stringify({ type: "phase_change", payload: { mode } }) }).catch(() => {});
      }, [mode]);

      useEffect(() => { return () => { if (timerRef.current) clearTimeout(timerRef.current); }; }, []);

      const btnStyle = (disabled) => ({
        backgroundColor: disabled ? "rgba(201,146,42,0.25)" : AMBER,
        color: disabled ? "rgba(247,240,227,0.35)" : NAVY,
        border: "none", borderRadius: "12px", padding: "9px 18px",
        fontSize: "12px", fontFamily: "'DM Sans', sans-serif", fontWeight: 700,
        cursor: disabled ? "not-allowed" : "pointer", transition: "all 0.15s", flexShrink: 0,
      });

      if (deviceView === null) {
        return <WhoIsReadingScreen onSelect={handleSelectDevice} />;
      }

      return (
        <div style={{
          height: "100dvh", backgroundColor: NAVY, display: "flex",
          flexDirection: "column", alignItems: "center", padding: "6px 12px 6px", overflow: "hidden",
        }}>
          <div style={{ textAlign: "center", marginBottom: "4px", flexShrink: 0, position: "relative", width: "100%" }}>
            <h1 style={{ color: "white", fontFamily: "'Playfair Display', serif", fontSize: "clamp(16px, 3vw, 30px)", fontWeight: 700, lineHeight: 1.1 }}>
              NeverMiss
            </h1>
            <p style={{ color: AMBER, fontFamily: "'DM Sans', sans-serif", fontSize: "10px", letterSpacing: "0.15em", marginTop: "1px" }}>
              Read · Connect · Remember
            </p>
            <div style={{ marginTop: "5px" }}><HelpToggle size="compact" /></div>
            <button onClick={handleSwitchDevice} style={{ position: "absolute", top: "2px", right: "4px", background: "none", border: "none", color: "rgba(247,240,227,0.28)", fontFamily: "'DM Sans', sans-serif", fontSize: "10px", cursor: "pointer", padding: "4px 6px", letterSpacing: "0.04em" }}>
              ⇄ switch
            </button>
          </div>

          <div style={{ display: "flex", gap: deviceView === "both" ? "clamp(8px, 1.5vw, 20px)" : 0, width: "100%", maxWidth: deviceView === "both" ? "min(98vw, 1620px)" : "min(95vw, 840px)", flex: 1, minHeight: 0, alignItems: "stretch", justifyContent: "center" }}>
            {(deviceView === "nana" || deviceView === "both") && <DeviceFrame label="NANA'S iPAD" isNana={true} displayPage={nanaPage} flipping={false} flipFromPage={nanaPage} flipToPage={nanaPage} mode={mode} promptIndex={promptIndex} childPromptIndex={childPromptIndex} showAndTellPromptIndex={showAndTellPromptIndex} myFilter={nanaSillyFilter} theirFilter={perrySillyFilter} onSetMyFilter={handleSetNanaFilter} sillyChallenge={sillyChallenge} sillyCountNum={sillyCountNum} onStartChallenge={handleStartChallenge} laughWinner={laughWinner} onLaughedFirst={handleLaughedFirst} onStartChat={handleStartChat} onStartReading={handleStartReading} onNextPrompt={handleNextPrompt} onNextChildPrompt={handleNextChildPrompt} onStartShowAndTell={handleStartShowAndTell} onNextShowAndTellPrompt={handleNextShowAndTellPrompt} onBackToReading={handleBackToReading} onStartParentCheck={handleStartParentCheck} onStartSillyFaces={handleStartSillyFaces} onBackFromSillyFaces={handleBackFromSillyFaces} goodbyePhase={goodbyePhase} onStartGoodbye={handleStartGoodbye} onSkipToGoodbye={handleSkipToGoodbye} onEndSession={handleEndSession} showConsentOverlay={!nanaConsentSeen} recordingOn={nanaRecordingOn} onToggleRecording={() => setNanaRecordingOn(v => !v)} onDismissConsent={() => setNanaConsentSeen(true)} isRecording={isRecording} scheduleProposal={scheduleProposal} myScheduleAccepted={nanaScheduleAccepted} otherScheduleAccepted={perryScheduleAccepted} onPropose={(d, t) => handlePropose(d, t, "nana")} onScheduleAccept={handleNanaAccept} selectedBookId={selectedBookId} onSelectBook={handleSelectBook} onConfirmBook={handleConfirmBook} bookPages={currentBook.pages} onboardingStep={nanaOnboardingStep} nanaDisplayName={nanaDisplayName} inviteToken={inviteToken} authError={authError} authLoading={authLoading} perryInviteError={perryInviteError} perryLookupNanaName={perryLookupNanaName} onNanaAuth={handleNanaAuth} onNanaCodeSent={handleNanaCodeSent} onPerryCodeSubmit={handlePerryCodeSubmit} onChildProfileConfirm={handleChildProfileConfirm} onBeginSession={handleBeginSession} onSkipOnboarding={handleSkipOnboarding} onOnboardingBack={nanaOnboardingStep > 0 ? handleNanaBack : undefined} phaseIntro={showPhaseCards ? phaseIntro : null} onDismissPhaseCard={() => setPhaseIntro(null)} onDisablePhaseCard={handleDisablePhaseCards} dashboardLoading={dashboardLoading} dashboardPerryName={dashboardPerryName} dashboardProgress={dashboardProgress} showChildIcebreakerPrompts={showChildIcebreakerPrompts} onToggleChildIcebreakerPrompts={() => { const next = !showChildIcebreakerPrompts; setShowChildIcebreakerPrompts(next); if (connectionId) apiCall(`/sessions/${connectionId}/event`, { method: "POST", body: JSON.stringify({ type: "toggle_child_prompts", payload: { show: next } }) }).catch(() => {}); }} onOpenVault={handleOpenVault} onCloseVault={handleCloseVault} vaultConnectionId={connectionId || undefined} onSwipePrev={() => changePage(nanaPage - 1)} onSwipeNext={() => changePage(nanaPage + 1)} fontScale={fontScale} />}
            {(deviceView === "perry" || deviceView === "both") && <DeviceFrame label="PERRY'S iPAD" isNana={false} displayPage={childPage} flipping={childFlipping} flipFromPage={flipFromPage} flipToPage={flipToPage} flipDirection={flipDirection} mode={perryAuthenticated ? mode : "onboarding"} promptIndex={promptIndex} childPromptIndex={childPromptIndex} showAndTellPromptIndex={showAndTellPromptIndex} myFilter={perrySillyFilter} theirFilter={nanaSillyFilter} onSetMyFilter={handleSetPerryFilter} sillyChallenge={sillyChallenge} sillyCountNum={sillyCountNum} onStartChallenge={handleStartChallenge} laughWinner={laughWinner} onLaughedFirst={handleLaughedFirst} onStartChat={handleStartChat} onStartReading={handleStartReading} onNextPrompt={handleNextPrompt} onNextChildPrompt={handleNextChildPrompt} onStartShowAndTell={handleStartShowAndTell} onNextShowAndTellPrompt={handleNextShowAndTellPrompt} onBackToReading={handleBackToReading} onStartParentCheck={handleStartParentCheck} onStartSillyFaces={handleStartSillyFaces} onBackFromSillyFaces={handleBackFromSillyFaces} goodbyePhase={goodbyePhase} onStartGoodbye={handleStartGoodbye} onSkipToGoodbye={handleSkipToGoodbye} onEndSession={handleEndSession} showConsentOverlay={!childConsentSeen} recordingOn={childRecordingOn} onToggleRecording={() => setChildRecordingOn(v => !v)} onDismissConsent={() => setChildConsentSeen(true)} isRecording={isRecording} scheduleProposal={scheduleProposal} myScheduleAccepted={perryScheduleAccepted} otherScheduleAccepted={nanaScheduleAccepted} onPropose={(d, t) => handlePropose(d, t, "perry")} onScheduleAccept={handlePerryAccept} selectedBookId={selectedBookId} onSelectBook={handleSelectBook} onConfirmBook={handleConfirmBook} bookPages={currentBook.pages} onboardingStep={perryOnboardingStep} nanaDisplayName={nanaDisplayName} inviteToken={inviteToken} authError={authError} authLoading={authLoading} perryInviteError={perryInviteError} perryLookupNanaName={perryLookupNanaName} onNanaAuth={handleNanaAuth} onNanaCodeSent={handleNanaCodeSent} onPerryCodeSubmit={handlePerryCodeSubmit} onChildProfileConfirm={handleChildProfileConfirm} onBeginSession={handleBeginSession} onSkipOnboarding={handleSkipOnboarding} onOnboardingBack={perryOnboardingStep > 0 ? handlePerryBack : undefined} phaseIntro={showPhaseCards ? phaseIntro : null} onDismissPhaseCard={() => setPhaseIntro(null)} onDisablePhaseCard={handleDisablePhaseCards} perryPinMode={perryPinMode} perryPinChildName={perryPinChildName} perryPinError={perryPinError} perryPinLoading={perryPinLoading} onPerryPinLogin={handlePerryPinLogin} showChildIcebreakerPrompts={showChildIcebreakerPrompts} onOpenVault={handleOpenVault} onCloseVault={handleCloseVault} vaultConnectionId={connectionId || undefined} onSwipePrev={() => changePage(nanaPage - 1)} onSwipeNext={() => changePage(nanaPage + 1)} fontScale={fontScale} />}
          </div>

          {mode === "reading" && deviceView === "perry" && (
            <div style={{ display: "flex", alignItems: "center", gap: "10px", marginTop: "4px", flexShrink: 0 }}>
              <button onClick={() => changePage(nanaPage - 1)} disabled={nanaPage === 1 || busy} style={btnStyle(nanaPage === 1 || busy)}>← Prev</button>
              <div style={{ textAlign: "center", minWidth: "100px" }}>
                <div style={{ color: AMBER, fontFamily: "'DM Sans', sans-serif", fontSize: "9px", fontWeight: 600, opacity: 0.8, marginBottom: "1px", letterSpacing: "0.02em" }}>{currentBook.title}</div>
                <div style={{ color: CREAM, fontFamily: "'DM Sans', sans-serif", fontSize: "11px", opacity: 0.7 }}>Page {childPage} / {currentBook.pages.length}</div>
              </div>
              <button onClick={() => changePage(nanaPage + 1)} disabled={nanaPage === currentBook.pages.length || busy} style={btnStyle(nanaPage === currentBook.pages.length || busy)}>Next →</button>
            </div>
          )}

          {mode === "reading" && deviceView !== "perry" && (
            <div style={{ display: "flex", alignItems: "center", gap: "10px", marginTop: "4px", flexShrink: 0 }}>
              <button onClick={() => changePage(nanaPage - 1)} disabled={nanaPage === 1 || busy} style={btnStyle(nanaPage === 1 || busy)}>← Prev</button>
              <div style={{ textAlign: "center", minWidth: "100px" }}>
                <div style={{ color: AMBER, fontFamily: "'DM Sans', sans-serif", fontSize: "9px", fontWeight: 600, opacity: 0.8, marginBottom: "1px", letterSpacing: "0.02em" }}>{currentBook.title}</div>
                <div style={{ color: CREAM, fontFamily: "'DM Sans', sans-serif", fontSize: "11px", opacity: 0.7 }}>Page {nanaPage} / {currentBook.pages.length}</div>
                {childPage !== nanaPage && (
                  <div style={{ color: AMBER, fontFamily: "'DM Sans', sans-serif", fontSize: "10px", opacity: 0.55 }}>Child: {childPage}</div>
                )}
              </div>
              <button onClick={() => changePage(nanaPage + 1)} disabled={nanaPage === currentBook.pages.length || busy} style={btnStyle(nanaPage === currentBook.pages.length || busy)}>Next →</button>
              <button onClick={handleStartShowAndTell} style={{ backgroundColor: "rgba(34,197,94,0.15)", color: "#22c55e", border: "1px solid #22c55e", borderRadius: "12px", padding: "9px 14px", fontSize: "12px", fontFamily: "'DM Sans', sans-serif", fontWeight: 700, cursor: "pointer", flexShrink: 0 }}>🎭 Show & Tell</button>
              <button onClick={cycleFontScale} title="Cycle font size" style={{ backgroundColor: "rgba(201,146,42,0.12)", color: AMBER, border: "1px solid rgba(201,146,42,0.5)", borderRadius: "12px", padding: "9px 13px", fontFamily: "'DM Sans', sans-serif", fontWeight: 700, cursor: "pointer", flexShrink: 0, lineHeight: 1, fontSize: fontScale >= 1.5 ? "17px" : fontScale >= 1.25 ? "14px" : "11px" }}>
                {"A" + (fontScale >= 1.5 ? "﹢﹢" : fontScale >= 1.25 ? "﹢" : "")}
              </button>
            </div>
          )}


        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
