          { leftEmoji: "🐛", leftChapter: "Chapter 5 · Advice from a Caterpillar", leftBody: "Alice found a large blue caterpillar perched on top of a mushroom. He fixed her with a steady gaze and asked the one question she could not answer.", rightTitle: null, rightTitleSub: null, rightBody: '"Who are YOU?" said the Caterpillar. Alice replied rather shyly, "I — I hardly know, sir, just at present — at least I know who I was when I got up this morning, but I think I must have changed several times since then."\n\n"What do you mean by that?" said the Caterpillar sternly. "Explain yourself!" "I can\'t explain myself, I\'m afraid, sir," said Alice, "because I\'m not myself, you see." "I don\'t see," said the Caterpillar. "I\'m afraid I can\'t put it more clearly," Alice replied very politely, "for I can\'t understand it myself to begin with; and being so many different sizes in a day is very confusing."', rightIsTitle: false, cue: "If someone asked 'Who are you?', what would you say?", nanaPrompt: "Ask Perry: if you could be someone completely different for one whole day, who would you pick and why?" },
          { leftEmoji: "👶", leftChapter: "Chapter 6 · Pig and Pepper", leftBody: "In the Duchess's kitchen, pepper filled every breath and everyone sneezed except the cook. A baby howled. Then, in Alice's arms, the baby slowly turned into something else entirely.", rightTitle: null, rightTitleSub: null, rightBody: '"Alice was just beginning to think that it was going to make a remarkably ugly child: but it makes rather a handsome pig, she thought. Alice gently put down the little creature and felt quite relieved to see it trot quietly into the wood.\n\nJust then she noticed the Cheshire Cat sitting on a bough of a tree a few yards off. "Cheshire Puss," she began rather timidly, "would you tell me, please, which way I ought to go from here?" "That depends a good deal on where you want to get to," said the Cat. "I don\'t much care where —" said Alice. "Then it doesn\'t matter which way you go," said the Cat. "— so long as I get somewhere," Alice added. "Oh, you\'re sure to do that," said the Cat, "if you only walk long enough."', rightIsTitle: false, cue: "Would you rather meet a baby that turns into a pig, or a pig that acts like a baby?", nanaPrompt: "Ask Perry: what's the silliest thing you can imagine happening in a kitchen?" },
          { leftEmoji: "☕", leftChapter: "Chapter 7 · A Mad Tea-Party", leftBody: "Alice came upon the strangest tea party she had ever seen — the March Hare, the Mad Hatter, and a sleeping Dormouse sat crowded at one end of a very long table.", rightTitle: null, rightTitleSub: null, rightBody: '"Have some wine," the March Hare said encouragingly. Alice looked round the table but there was nothing on it but tea. "I don\'t see any wine," she remarked. "There isn\'t any," said the March Hare. "Then it wasn\'t very civil of you to offer it," said Alice angrily.\n\n"It wasn\'t very civil of you to sit down without being invited," said the March Hare. "I didn\'t know it was your table," said Alice. "It\'s laid for a great many more than three." "Your hair wants cutting," said the Hatter. He had been looking at Alice for some time with great curiosity. "You should learn not to make personal remarks," Alice said with some severity. "It\'s very rude."', rightIsTitle: false, cue: "Why do you think the Hatter is called 'Mad'?", nanaPrompt: "Ask Perry: if you could host the silliest tea party ever, who would you invite — real or made-up?" },
          { leftEmoji: "👑", leftChapter: "Chapter 8 · The Queen's Croquet-Ground", leftBody: "The Queen of Hearts was fond of only one expression — and she used it for almost every occasion. Flamingoes were used as mallets, hedgehogs as balls, playing-card soldiers as hoops.", rightTitle: null, rightTitleSub: null, rightBody: '"Off with their heads!" the Queen shouted. Nobody paid much attention, for the soldiers were always getting up and walking off to do something else. Alice began to feel quite uneasy.\n\nThe players all played at once without waiting for turns, quarrelling all the while, and fighting for the hedgehogs. In a very short time the Queen was in a furious passion, and went stamping about, shouting "Off with his head!" about once a minute. Alice began to feel very anxious about her own safety, and she looked round to see how she could escape. "How are you getting on?" said the Cat, appearing out of thin air.', rightIsTitle: false, cue: "Would you like the Queen of Hearts as your ruler?", nanaPrompt: "Ask Perry: if you were in charge for one whole day, what's the very first rule you would make?" },
          { leftEmoji: "⚖️", leftChapter: "Chapter 12 · Alice's Evidence", leftBody: "Alice found herself in the strangest courtroom ever: the King and Queen of Hearts presided, the jury was twelve nervous creatures, and she was the very last witness.", rightTitle: null, rightTitleSub: null, rightBody: '"I\'m not afraid of you!" said Alice. "Who cares for you? You\'re nothing but a pack of cards!" At this the whole pack rose up into the air and came flying down upon her; she gave a little scream, half of fright and half of anger, and tried to beat them off.\n\nThen she found herself lying on the bank, with her head in the lap of her sister, who was gently brushing away some dead leaves that had fluttered down from the trees upon her face. "Wake up, Alice dear!" said her sister. "Why, what a long sleep you\'ve had!" And so Alice woke up from her long strange dream — though she half wondered, for a moment, if it had been a dream at all.', rightIsTitle: false, cue: "What do you think the dream meant?", nanaPrompt: "Tell Perry about a dream you remember that felt very real. Ask her: have you ever had a dream like that — what happened in it?" },
        ],

      velveteen: {
        id: "velveteen", title: "The Velveteen Rabbit", author: "Margery Williams", emoji: "🐰", spineColor: "#8B4C3A",
        coverUrl: "cover-velveteen.jpg",
        ageRange: "4–8", readingLevel: "Grade 4–5", lexile: "930L",
        tagline: "A toy rabbit learns what it truly means to be Real.",
        gutenbergUrl: "https://www.gutenberg.org/ebooks/11757",
        standardEbooksUrl: "https://standardebooks.org/ebooks/margery-williams/the-velveteen-rabbit",
        pages: [
          { leftEmoji: "🐰", leftChapter: "The Velveteen Rabbit", leftBody: "A toy rabbit sits on a boy's bed, wondering what it means to be real. His journey to discover the answer will change everything.", rightTitle: "The Velveteen Rabbit", rightTitleSub: "by Margery Williams", rightBody: "Or How Toys Become Real — a timeless story about love, loyalty, and what it truly means to be alive.", rightIsTitle: true, cue: "Do you have a favorite stuffed animal?", nanaPrompt: "Ask Perry: do you have a favorite stuffed animal or toy? What makes it special?" },
          { leftEmoji: "🧸", leftChapter: "Christmas Morning", leftBody: "The Velveteen Rabbit was new at first — fat and bunchy, spotted brown and white, with real thread whiskers. But on Christmas morning, the Boy barely noticed him.", rightTitle: null, rightTitleSub: null, rightBody: '"There was once a velveteen rabbit, and in the beginning he was really splendid. He was fat and bunchy, as a rabbit should be; his coat was spotted brown and white, he had real thread whiskers, and his ears were lined with pink sateen."', rightIsTitle: false, cue: "What does your favorite toy look like?", nanaPrompt: "Ask Perry to describe her favorite stuffed animal — what does it look like, what does it feel like, and what's its name?" },
          { leftEmoji: "🐎", leftChapter: "What is REAL?", leftBody: "In the nursery lived a wise old Skin Horse. He told the Rabbit something wonderful one afternoon — something that changed the way the Rabbit saw everything.", rightTitle: null, rightTitleSub: null, rightBody: '"What is REAL?" asked the Rabbit. "Real isn\'t how you are made," said the Skin Horse. "It\'s a thing that happens to you. When a child loves you for a long, long time — REALLY loves you — then you become Real."', rightIsTitle: false, cue: "What do you think 'Real' means?", nanaPrompt: "Ask Perry: have you ever loved a toy so much it almost felt alive? What made it special?" },
          { leftEmoji: "🎪", leftChapter: "The Nursery", leftBody: "In the nursery, the mechanical toys were very grand and rather superior. They looked down on the Rabbit. But the Skin Horse — old and threadbare — had a wisdom none of them possessed.", rightTitle: null, rightTitleSub: null, rightBody: '"The mechanical toys were very superior, and looked down upon everyone else. They were full of modern ideas, and pretended they were real. The model boat would never admit that his paint was peeling."', rightIsTitle: false, cue: "Do you think new things are always better than old things?", nanaPrompt: "Ask Perry: is there something old that means a lot to you — maybe something passed down from family? Tell her about one of yours." },
          { leftEmoji: "🌿", leftChapter: "The Woods", leftBody: "Spring came, and the Boy brought the Rabbit outside for the first time. Among the bracken and ferns, the Rabbit met real rabbits — and started to wonder what he truly was.", rightTitle: null, rightTitleSub: null, rightBody: '"Does it hurt?" asked the Rabbit. "Sometimes," said the Skin Horse, for he was always truthful. "When you are Real you don\'t mind being hurt. It doesn\'t happen all at once. It takes a long time."', rightIsTitle: false, cue: "What do you think it takes to become Real?", nanaPrompt: "Ask Perry: what are you working on right now that takes real patience — something you have to keep at, little by little?" },
          { leftEmoji: "🤒", leftChapter: "The Scarlet Fever", leftBody: "The Boy fell very ill with scarlet fever. Night after night the Velveteen Rabbit lay close beside him, giving all the comfort a rabbit can give — which is more than you might think.", rightTitle: null, rightTitleSub: null, rightBody: '"During the long nights the Rabbit lay close beside the Boy. The little rabbit listened. He was so tired himself that he did not care what happened next, as long as they were together."', rightIsTitle: false, cue: "What do you do when someone you love is sick?", nanaPrompt: "Ask Perry: when you're sick, what makes you feel better? Tell her what Nana used to do as a little girl." },
          { leftEmoji: "✨", leftChapter: "The Nursery Magic", leftBody: "The Boy recovered, but the Rabbit was taken away to be burned. Then — in the moonlight — a fairy appeared, and everything the Rabbit had been promised came true at last.", rightTitle: null, rightTitleSub: null, rightBody: '"She gave him a kiss. She put him down on the grass. \"Run and play, little Rabbit!\" Then two little arms were round his neck, for a moment she held him close. And when he came to himself, he was a Real Rabbit at last."', rightIsTitle: false, cue: "How did this story make you feel?", nanaPrompt: "Give Perry a quiet moment. Then ask: who in your life makes you feel completely loved just as you are?" },
          { leftEmoji: "🌸", leftChapter: "Spring Returns", leftBody: "In the wood, among the bracken and ferns, a real wild rabbit twitched his nose. He had lived there all his life — free and wild. But he watched the Boy from a distance, and remembered.", rightTitle: null, rightTitleSub: null, rightBody: '"He was a Real Rabbit at last, at home with the other rabbits. And when spring came and the Boy went to play in the garden, the little rabbit came and watched. But the Boy never knew."', rightIsTitle: false, cue: "Do you think the Rabbit remembered being loved?", nanaPrompt: "Ask Perry: what's one memory from your life that you'd want to hold onto forever, no matter what?" },
        ],
      },
      peter: {
        id: "peter", title: "The Tale of Peter Rabbit", author: "Beatrix Potter", emoji: "🥕", spineColor: "#3D6B4A",
        coverUrl: "cover-peter.jpg",
        ageRange: "4–7", readingLevel: "Grade 2–3", lexile: "700L",
        tagline: "The mischievous adventures of the most famous rabbit in children's literature.",
        gutenbergUrl: "https://www.gutenberg.org/ebooks/14838",
        standardEbooksUrl: "https://standardebooks.org/ebooks/beatrix-potter/the-tale-of-peter-rabbit",
        pages: [
          { leftEmoji: "🐇", leftChapter: "The Tale of Peter Rabbit", leftBody: "Four little rabbits lived with their mother under a fir tree. Three were good. One was very, very naughty — and his name was Peter.", rightTitle: "The Tale of Peter Rabbit", rightTitleSub: "by Beatrix Potter", rightBody: "The mischievous adventures of the most famous rabbit in all of children's literature — and what happened when he disobeyed his mother.", rightIsTitle: true, cue: "Have you ever done something you were told not to?", nanaPrompt: "Ask Perry: what's the hardest rule for you to follow — and why?" },
          { leftEmoji: "🌿", leftChapter: "The Fir Tree", leftBody: "Mrs. Rabbit told her children they could go into the fields — but warned them NEVER to go into Mr. McGregor's garden. Their father had an accident there.", rightTitle: null, rightTitleSub: null, rightBody: '"Once upon a time there were four little Rabbits, and their names were — Flopsy, Mopsy, Cottontail, and Peter. They lived with their Mother in a sand-bank, underneath the root of a very big fir tree."', rightIsTitle: false, cue: "Can you remember all four names?", nanaPrompt: "Quiz Perry: can you name all four rabbits — Flopsy, Mopsy, Cottontail, and Peter — without looking?" },
          { leftEmoji: "🥕", leftChapter: "The Garden", leftBody: "Flopsy, Mopsy, and Cottontail went to gather blackberries. But Peter ran straight to Mr. McGregor's garden and squeezed under the gate — just as his mother had warned.", rightTitle: null, rightTitleSub: null, rightBody: '"Peter ate some lettuces and some French beans; and then he ate some radishes; and then, feeling rather sick, he went to look for some parsley. But round the end of a cucumber frame, whom should he meet but Mr. McGregor!"', rightIsTitle: false, cue: "What should Peter have done?", nanaPrompt: "Ask Perry: do you think Peter was brave or foolish? What would you have done in his place?" },
          { leftEmoji: "🏃", leftChapter: "The Chase", leftBody: "Mr. McGregor caught sight of Peter and gave chase — all through the garden, over the flower pots, past the cucumber frames, and round the lettuces. Peter ran with all his might.", rightTitle: null, rightTitleSub: null, rightBody: '"Mr. McGregor was after him in no time, and Peter jumped into a watering-can to hide. It would have been a beautiful thing to hide in, if it had not had so much water in it."', rightIsTitle: false, cue: "Have you ever had to hide somewhere unexpected?", nanaPrompt: "Ask Perry: what's the best hiding spot you've ever found? Tell her yours from when you were little!" },
          { leftEmoji: "🌱", leftChapter: "The Tool Shed", leftBody: "Peter found a door in a wall, but it was locked. He sat down in a tool shed and began to cry, not knowing which way to go. Then he heard a sound — hoe-scrape, hoe-scrape — coming closer.", rightTitle: null, rightTitleSub: null, rightBody: '"He was out of breath and trembling with fright, and he had not the least idea which way to go. Presently he came to a pond where Mr. McGregor filled his watering-cans. A white cat was staring at some goldfish. She sat very, very still."', rightIsTitle: false, cue: "What would you do if you were lost and scared?", nanaPrompt: "Tell Perry: if you were ever lost or scared, who's the first person you'd look for? Remind her you'd always come." },
          { leftEmoji: "👘", leftChapter: "Lost!", leftBody: "In his rush to escape, Peter lost first his shoes among the cabbages, then his little blue jacket with the brass buttons. Running on four legs was much faster, but he left everything behind.", rightTitle: null, rightTitleSub: null, rightBody: '"Peter was most dreadfully frightened. He rushed all over the garden, for he had forgotten the way back to the gate. He lost one of his shoes among the cabbages, and the other shoe amongst the potatoes."', rightIsTitle: false, cue: "Have you ever had to leave something behind to run faster?", nanaPrompt: "Tell Perry about something you had to give up to keep moving forward. Ask her: have you ever had to let something go?" },
          { leftEmoji: "🚪", leftChapter: "The Gate", leftBody: "At last — there was the gate! Peter slipped underneath with just enough space to spare. He ran all the way home without looking back once, not until the fir tree was in sight.", rightTitle: null, rightTitleSub: null, rightBody: '"Peter got through the gate safely, and he ran with all his might until he reached the fir tree. He threw himself down and shut his eyes. His mother was busy cooking, but she looked over her shoulder at him."', rightIsTitle: false, cue: "Do you think Peter felt glad or ashamed when he got home?", nanaPrompt: "Ask Perry: when Peter got home, do you think he felt glad or ashamed — or both? What would you have felt?" },
          { leftEmoji: "🍵", leftChapter: "Home at Last", leftBody: "Peter's mother put him to bed with camomile tea without asking questions. His sisters had a delicious supper of bread and milk and blackberries. Peter had nothing at all.", rightTitle: null, rightTitleSub: null, rightBody: '"Peter was not very well during the evening. His mother put him to bed, and made some camomile tea. But Flopsy, Mopsy, and Cottontail had bread and milk and blackberries for supper."', rightIsTitle: false, cue: "Do you think Peter learned his lesson?", nanaPrompt: "Ask Perry: what do you think Peter will do differently next time? What's a mistake you've actually learned from?" },
        ],
      },
      secretgarden: {
        id: "secretgarden", title: "The Secret Garden", author: "Frances Hodgson Burnett", emoji: "🌹", spineColor: "#4A7C59",
        coverUrl: "cover-secretgarden.jpg", ageRange: "8–12", readingLevel: "Grade 6–7", lexile: "970L",
        tagline: "A lonely, unloved girl discovers a hidden garden — and finds herself growing alongside it.",
        gutenbergUrl: "https://www.gutenberg.org/ebooks/113",
        standardEbooksUrl: "https://standardebooks.org/ebooks/frances-hodgson-burnett/the-secret-garden",
        pages: [
          { leftEmoji: "🌹", leftChapter: "The Secret Garden", leftBody: "Mary Lennox is ten years old, cross, and certain that nobody in the world loves her. She is wrong about many things — but right that a secret is waiting to be found.", rightTitle: "The Secret Garden", rightTitleSub: "by Frances Hodgson Burnett", rightBody: "A story about a locked garden, a lonely girl, and the extraordinary things that happen when something — or someone — begins to grow.", rightIsTitle: true, cue: "Do you think a garden can change a person?", nanaPrompt: "Ask Perry: is there a place — a room, a yard, a special spot outside — where you feel completely like yourself? Describe it." },
          { leftEmoji: "🇮🇳", leftChapter: "Chapter I · There is No One Left", leftBody: "Mary Lennox was born in India, where she was raised by servants and ignored by her beautiful mother. Then cholera came to the bungalow — and when the soldiers arrived, they found only Mary.", rightTitle: null, rightTitleSub: null, rightBody: '"It is the child no one ever saw!" exclaimed the man. "She has actually been forgotten!" "Why was I forgotten?" Mary said, stamping her foot. "Why does nobody come?" The young man looked at her very sadly. "Poor little kid!" he said. "There is nobody left to come."', rightIsTitle: false, cue: "How do you think Mary felt in that moment?", nanaPrompt: "Tell Perry about a time you felt left out or alone — even for just an afternoon. Then ask: have you ever felt that way? What helped?" },
          { leftEmoji: "🌧️", leftChapter: "Chapter II · Mistress Mary Quite Contrary", leftBody: "Mary was sent to England — to the great, gloomy Misselthwaite Manor on the moors. She was disagreeable. She was spoiled. But somewhere inside her, something was beginning to stir.", rightTitle: null, rightTitleSub: null, rightBody: '"Mistress Mary, quite contrary, how does your garden grow?" the children sang. The crosser Mary got, the more they sang. She had never had anyone to play with. She had never learned how. She didn\'t know — yet — that she was going to."', rightIsTitle: false, cue: "Why do you think Mary was so unpleasant? Was it her fault?", nanaPrompt: "Ask Perry: can you feel sorry for someone who is being unkind? Have you ever looked past someone\'s grumpy outside to see what\'s underneath?" },
          { leftEmoji: "🔑", leftChapter: "Chapter VII · The Key to the Garden", leftBody: "On the moors Mary began to walk — and as she walked she wondered about the one garden that was always locked. Then, in the earth, her stick struck something.", rightTitle: null, rightTitleSub: null, rightBody: '"She dug and pulled and found it was a key — a little rusty key which looked as if it had been buried a long time. She looked at it with an almost frightened delight. She buried it again — oh, so carefully! — and covered it with a flat stone, for she wanted to think about it before she did anything."', rightIsTitle: false, cue: "What would you do if you found a mysterious key?", nanaPrompt: "Ask Perry: if you found a mysterious old key, what would you hope it unlocked?" },
          { leftEmoji: "🐦", leftChapter: "Chapter VIII · The Robin Who Showed the Way", leftBody: "A round red-breasted little robin had become Mary\'s friend on the moors. One day he landed near a patch of disturbed earth — and beneath the ivy, Mary saw something she had not dared hope for.", rightTitle: null, rightTitleSub: null, rightBody: '"She put her hands under the leaves and began to pull and push them aside. Thick as the ivy hung, it nearly all was a loose and swinging curtain. Mary\'s heart began to thump and her hands to shake a little in her delight and excitement. The robin kept singing. She had found the door."', rightIsTitle: false, cue: "Have you ever found something you'd been searching for? How did it feel?", nanaPrompt: "Tell Perry about a time you discovered something wonderful that had been hidden from you. Ask her: have you ever had that feeling of finding something surprising?" },
          { leftEmoji: "🧑‍🌾", leftChapter: "Chapter X · Dickon", leftBody: "Mary met a boy sitting on the grass playing a rough wooden pipe. The animals on the moors came to him as if he were a friend they had known always. His name was Dickon, and he could make things grow.", rightTitle: null, rightTitleSub: null, rightBody: '"A boy was sitting under a tree, with his back against it, playing on a rough wooden pipe. Two rabbits were sitting up and sniffing at him. Two squirrels were watching from a nearby branch. He looked clean and like the open country itself."', rightIsTitle: false, cue: "Would you trust Dickon? Why or why not?", nanaPrompt: "Ask Perry: do you have a friend who makes everyone around them feel calm or happy just by being there? What makes that person special?" },
          { leftEmoji: "🕯️", leftChapter: "Chapter XIV · A Young Rajah", leftBody: "Late one night Mary heard crying through the walls of the manor. She followed the sound through dark corridors — until she found something no one had ever told her was there: a boy.", rightTitle: null, rightTitleSub: null, rightBody: '"I am Colin," said the boy, "I am always ill and I am going to die." He said it as if he had said it so often he had ceased to feel much about it. "He was pale and seemed too thin for his height."', rightIsTitle: false, cue: "Why do you think no one told Mary about Colin?", nanaPrompt: "Ask Perry: what would you say to a kid who had given up and felt like nothing would ever get better?" },
          { leftEmoji: "☀️", leftChapter: "Chapter XXVII · In Ben Weatherstaff\'s Garden", leftBody: "Spring came to the secret garden. Colin — who had never walked without help — ran. He dug and planted and felt the sun on his face. Mary watched, and understood what the garden had done for her, too.", rightTitle: null, rightTitleSub: null, rightBody: '"\"It\'s a secret garden,\" said Mary. Colin swept his arm around. \"And I shall live forever and ever and ever!\" he cried. Ben Weatherstaff rubbed his eyes. \"Aye,\" he said, \"tha\' will.\" And there was something in the way he said it that Mary knew was true."', rightIsTitle: false, cue: "What did the secret garden give to each person in the story?", nanaPrompt: "Ask Perry: what\'s one thing you want to grow — in yourself or in the world — this year? Nana can share hers too." },
        ],

      oz: {
        id: "oz", title: "The Wonderful Wizard of Oz", author: "L. Frank Baum", emoji: "🌪️", spineColor: "#7B9E3B",
        coverUrl: "cover-oz.jpg", ageRange: "7–11", readingLevel: "Grade 5–6", lexile: "1000L",
        tagline: "A Kansas girl is swept away to a magical land — and discovers the power was inside her all along.",
        gutenbergUrl: "https://www.gutenberg.org/ebooks/55",
        standardEbooksUrl: "https://standardebooks.org/ebooks/l-frank-baum/the-wonderful-wizard-of-oz",
        pages: [
          { leftEmoji: "🌪️", leftChapter: "The Wonderful Wizard of Oz", leftBody: "Dorothy lives in the grey Kansas prairies with Aunt Em, Uncle Henry, and her little black dog Toto. She has never imagined a world of colour. Then the cyclone comes.", rightTitle: "The Wonderful Wizard of Oz", rightTitleSub: "by L. Frank Baum", rightBody: "A Kansas girl whisked to a magical land of emerald cities, talking scarecrows, and witches both wicked and good — a story about what it means to find your way home.", rightIsTitle: true, cue: "If a cyclone could take you anywhere, where would you want to land?", nanaPrompt: "Ask Perry: what does \'home\' mean to you? Is it a place, a feeling, or the people you\'re with?" },
          { leftEmoji: "🏡", leftChapter: "Chapter I · The Cyclone", leftBody: "The sky turned green-grey and the wind shrieked. Dorothy ran inside but couldn\'t reach the cellar in time. The house rose slowly into the sky — and Dorothy, with Toto beside her, was carried miles away.", rightTitle: null, rightTitleSub: null, rightBody: '"The house whirled around two or three times and rose slowly through the air. Dorothy felt as if she were going up in a balloon. Hour after hour passed. At last she crawled to her bed and lay down, and Toto lay beside her, and Dorothy fell fast asleep."', rightIsTitle: false, cue: "How would you feel if your house was lifted into the sky?", nanaPrompt: "Ask Perry: if you had to pick one person to be with during a scary adventure, who would you choose and why?" },
          { leftEmoji: "🧙‍♀️", leftChapter: "Chapter II · The Council with the Munchkins", leftBody: "Dorothy\'s house had landed on the Wicked Witch of the East. A little old woman appeared and bowed. The Munchkins were free. And Dorothy was — accidentally — a heroine.", rightTitle: null, rightTitleSub: null, rightBody: '"You are welcome, most noble Sorceress. We are so grateful to you for having killed the Wicked Witch of the East." Dorothy listened with wonder. "There must be some mistake," she said. "I have not killed anything." "Your house did, anyway," replied the little old woman, with a laugh."', rightIsTitle: false, cue: "Can you be a hero by accident?", nanaPrompt: "Ask Perry: have you ever done something good by accident, without even trying? What happened?" },
          { leftEmoji: "🌾", leftChapter: "Chapter III · How Dorothy Saved the Scarecrow", leftBody: "Dorothy and Toto set off down the yellow brick road to the Emerald City. On the way, she met a Scarecrow who wanted a brain more than anything — and came along anyway.", rightTitle: null, rightTitleSub: null, rightBody: '"Do you think," he asked, "if I go to the Emerald City with you, that Oz would give me some brains?" "I cannot tell," she returned, "but you may come with me, if you like. If Oz will not give you any brains you will be no worse off than you are now." "That is true," said the Scarecrow."', rightIsTitle: false, cue: "Is it brave or foolish to travel with someone you just met?", nanaPrompt: "Ask Perry: if you could have one — a great brain, a kind heart, or real courage — which would you pick? Which do you think you already have?" },
          { leftEmoji: "🪓", leftChapter: "Chapter V · The Rescue of the Tin Woodman", leftBody: "Deep in the forest they found a man made entirely of tin, so rusted he could not move his jaw to call for help. He had stood there for over a year — waiting. He wanted only a heart.", rightTitle: null, rightTitleSub: null, rightBody: '"My greatest wish," said the Tin Woodman, "is to get a heart. The Munchkins are lucky to have theirs. I shall ask Oz to give me one." He spoke so earnestly that Dorothy looked at him with surprise. "If I only had a heart," he said again, and sighed."', rightIsTitle: false, cue: "Why do you think the Tin Woodman wanted a heart so badly?", nanaPrompt: "Ask Perry: what does it mean to have a big heart? Who do you know that has one? Tell her why Nana thinks she does." },
          { leftEmoji: "🦁", leftChapter: "Chapter VI · The Cowardly Lion", leftBody: "A great Lion leaped out and roared — and Toto barely escaped. Dorothy slapped the Lion on the nose. He began to cry. He was the King of Beasts, he said, and he was completely, utterly terrified of everything.", rightTitle: null, rightTitleSub: null, rightBody: '"Isn\'t he a coward?" asked Dorothy. "Certainly," said the Lion, wiping his eye with the tip of his tail. "It is my great sorrow, and makes my life very unhappy. But whenever there is danger my heart begins to beat fast." "Maybe you have heart disease," said the Tin Woodman."', rightIsTitle: false, cue: "Is the Lion really a coward if he still moves forward even when scared?", nanaPrompt: "Ask Perry: what\'s something you\'re a little scared of but you do anyway? Tell her that\'s exactly what real courage looks like." },

            {p.leftChapter && (() => {

    /* Parses nanaPrompt → label + split sentences */
    function ChatModePrompt({ text }) {
      const m = text.match(/^(Ask|Tell|Quiz|Give)\s+Perry\s*[:\s]/i);
      const prefix = m ? m[0].replace(/\s*[:\s]+$/, '').trim() : null;
      const body   = m ? text.slice(m[0].length).trim() : text;
      const rawParts = body.split('? ');
      const sentences = rawParts
        .map((p, i) => (i < rawParts.length - 1 ? p.trim() + '?' : p.trim()))
        .filter(p => p.length > 0);
      return (
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: '14px', overflow: 'hidden' }}>
          {prefix && (
            <span style={{ color: 'rgba(201,146,42,0.45)', fontFamily: "'Merriweather', serif", fontSize: '15px', fontWeight: 600, fontStyle: 'italic' }}>
              {prefix}
            </span>
          )}
          {sentences.map((s, i) => (
            <p key={i} style={{ color: CREAM, fontFamily: "'Merriweather', serif", fontSize: '15px', fontWeight: 700, lineHeight: 1.55, margin: 0 }}>
              {s}
            </p>
          ))}
        </div>
      );
    }

    function BookSpread({ displayPage, isNana, flipping, flipFromPage, flipToPage, flipDirection, onStartChat, bookPages, bookTitle, onSwipePrev, onSwipeNext, fontScale = 1 }) {
      const p = bookPages[displayPage - 1];
      const touchStartX = React.useRef(null);
      const touchStartY = React.useRef(null);

      const handleTouchStart = (e) => {
        touchStartX.current = e.touches[0].clientX;
        touchStartY.current = e.touches[0].clientY;
      };
      const handleTouchEnd = (e) => {
        if (touchStartX.current === null || touchStartY.current === null) return;
        const dx = e.changedTouches[0].clientX - touchStartX.current;
        const dy = e.changedTouches[0].clientY - touchStartY.current;
        touchStartX.current = null;
        touchStartY.current = null;
        if (Math.abs(dx) < 40 || Math.abs(dx) < Math.abs(dy)) return;
        if (dx < 0) onSwipeNext && onSwipeNext();
        else onSwipePrev && onSwipePrev();
      };

      return (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
          {/* Book fills remaining height */}
          <div style={{ flex: 1, position: "relative", overflow: "hidden" }} onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd}>
            <div style={{
              position: "absolute", inset: 0,
              backgroundColor: PARCHMENT,
              borderTop: `3px solid ${LEATHER}`,
              borderBottom: `3px solid ${LEATHER}`,
              display: "flex", overflow: "hidden",
            }}>
              <div style={{
                position: "absolute", top: "8px", left: "10px", zIndex: 5,
                color: "#ef4444", fontSize: "9px", fontFamily: "'DM Sans', sans-serif", fontWeight: 700,
                display: "flex", alignItems: "center", gap: "4px",
              }}>
                <span style={{ display: "inline-block", width: "6px", height: "6px", borderRadius: "50%", backgroundColor: "#ef4444" }} />
                REC
              </div>
              <BookContent page={flipping ? flipToPage : displayPage} bookPages={bookPages} bookTitle={bookTitle} fontScale={fontScale} />
            </div>

            {/* Page-flip overlay (child only) */}
            {!isNana && flipping && (() => {
              const back = flipDirection === "backward";
              return (
                <div style={{ position: "absolute", inset: 0, pointerEvents: "none", overflow: "hidden" }}>
                  <div style={{
                    position: "absolute", top: 0,
                    left: back ? "0" : "50%",
                    width: "50%", height: "100%",
                    transformOrigin: back ? "right center" : "left center",
                    backgroundColor: PARCHMENT,
                    borderTop: `3px solid ${LEATHER}`,
                    borderBottom: `3px solid ${LEATHER}`,
                    ...(back ? { borderLeft: `3px solid ${LEATHER}` } : { borderRight: `3px solid ${LEATHER}` }),
                    animation: `${back ? "page-flip-back" : "page-flip"} 0.65s cubic-bezier(0.4, 0, 0.2, 1) forwards`,
                    overflow: "hidden", zIndex: 20,
                  }}>
                    <div style={{
                      position: "absolute", inset: 0,
                      background: back
                        ? "linear-gradient(to right, rgba(0,0,0,0.04) 0%, rgba(0,0,0,0.18) 40%, rgba(0,0,0,0.35) 100%)"
                        : "linear-gradient(to left, rgba(0,0,0,0.04) 0%, rgba(0,0,0,0.18) 60%, rgba(0,0,0,0.35) 100%)",
                      pointerEvents: "none",
                    }} />
                  </div>
                </div>
              );
            })()
            )}


            {/* Nana prompt — bottom-left chip */}
            {isNana && (
              <div style={{
                position: "absolute", bottom: "8px", left: "8px", zIndex: 10, maxWidth: "180px",
                backgroundColor: "rgba(11, 23, 46, 0.88)",
                border: "1px solid rgba(201,146,42,0.5)",
                borderRadius: "10px", padding: "6px 9px",
              }}>
                <div style={{ display: "flex", alignItems: "center", gap: "4px", marginBottom: "4px" }}>
                  <span style={{ fontSize: "10px" }}>💬</span>
                  <span style={{ color: AMBER, fontFamily: "'DM Sans', sans-serif", fontSize: "8px", fontWeight: 700, letterSpacing: "0.08em" }}>NANA PROMPT</span>
                </div>
                <p style={{ color: CREAM, fontFamily: "'Merriweather', serif", fontSize: "9px", fontStyle: "italic", lineHeight: 1.45, marginBottom: "6px" }}>
                  {p.nanaPrompt}
                </p>
                <div style={{ display: "flex", gap: "5px" }}>
                  <button onClick={onStartChat} style={{ backgroundColor: "#22c55e", color: "white", border: "none", borderRadius: "5px", padding: "3px 8px", fontSize: "9px", fontFamily: "'DM Sans', sans-serif", fontWeight: 700, cursor: "pointer" }}>✓ Use</button>
                  <button style={{ backgroundColor: "rgba(255,255,255,0.12)", color: CREAM, border: "none", borderRadius: "5px", padding: "3px 8px", fontSize: "9px", fontFamily: "'DM Sans', sans-serif", fontWeight: 700, cursor: "pointer" }}>Skip</button>
                </div>
              </div>
            )}
          </div>

          {/* Bottom cue (Nana only) + progress */}
          <div style={{ backgroundColor: "#0b172e", padding: "5px 10px 6px", display: "flex", flexDirection: "column", gap: "4px", borderTop: "1px solid rgba(255,255,255,0.06)", flexShrink: 0 }}>
            {isNana && (
              <span style={{ color: AMBER, fontFamily: "'DM Sans', sans-serif", fontWeight: 700, fontSize: "10px", textAlign: "center" }}>{p.cue}</span>
            )}
            <div style={{ height: "3px", backgroundColor: "rgba(201,146,42,0.18)", borderRadius: "2px" }}>
              <div style={{ height: "100%", width: `${(displayPage / bookPages.length) * 100}%`, backgroundColor: AMBER, borderRadius: "2px", transition: "width 0.4s ease" }} />
            </div>
          </div>
        </div>
      );
    }

            <div style={{ color: AMBER, fontFamily: "Playfair Display, serif", fontSize: "13px", fontWeight: 700 }}>Tell us about your reader</div>
          </div>

    /* Memory Vault helpers */
    function computeAge(birthday, sessionDate) {
      const bd = new Date(birthday);
      const sd = new Date(sessionDate);
      let age = sd.getFullYear() - bd.getFullYear();
      const m = sd.getMonth() - bd.getMonth();
      if (m < 0 || (m === 0 && sd.getDate() < bd.getDate())) age--;
      return age;
    }
    function formatSessionDate(iso) {
      return new Date(iso).toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" });
    }

    function VaultView({ onClose, connectionId }) {
      const [loading, setLoading] = useState(true);
      const [sessions, setSessions] = useState([]);
      const [child, setChild] = useState(null);

      useEffect(() => {
        if (!connectionId) { setLoading(false); return; }
        setLoading(true);
        fetch(`/api/session-log/${connectionId}`, { credentials: "include" })
          .then(r => r.json())
          .then(({ sessions: s, child: c }) => { setSessions(s || []); setChild(c || null); })
          .catch(() => {})
          .finally(() => setLoading(false));
      }, [connectionId]);

      const childName = child?.name ?? "Perry";

      return (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", backgroundColor: "#0b172e", overflow: "hidden" }}>

            <div style={{ color: CREAM, fontFamily: "'Playfair Display', serif", fontSize: "14px", fontWeight: 700, marginTop: "3px" }}>Memory Vault</div>
            <div style={{ color: "rgba(247,240,227,0.4)", fontFamily: "'DM Sans', sans-serif", fontSize: "9px", marginTop: "2px", letterSpacing: "0.04em" }}>Your reading memories · growing over time</div>
          </div>
          <div style={{ flex: 1, padding: "10px", overflow: "auto", display: "flex", flexDirection: "column", gap: "8px" }}>
            {loading && (
              <div style={{ textAlign: "center", padding: "20px", color: "rgba(247,240,227,0.3)", fontFamily: "'DM Sans', sans-serif", fontSize: "9px" }}>Loading memories…</div>
            )}
            {!loading && sessions.length === 0 && (
              <div style={{ textAlign: "center", padding: "20px" }}>
                <div style={{ fontSize: "28px", marginBottom: "8px" }}>📚</div>
                <div style={{ color: "rgba(247,240,227,0.4)", fontFamily: "'Merriweather', serif", fontSize: "9px", fontStyle: "italic", lineHeight: 1.6 }}>
                  Your reading memories will appear here after your first session.
                </div>
              </div>
            )}
            {!loading && sessions.map((entry, idx) => {
              const book = booksLibrary[entry.bookId] || { title: entry.bookId, emoji: "📖", spineColor: "#4A6FA5" };
              const isNew = (Date.now() - new Date(entry.sessionDate).getTime()) < 7 * 24 * 60 * 60 * 1000;
              const isLatest = idx === 0;
              const age = child?.birthday ? computeAge(child.birthday, entry.sessionDate) : null;
              const pagesRead = Math.max(0, entry.endPage - entry.startPage);
              return (
                <div key={entry.id} style={{
                  display: "flex", alignItems: "center", gap: "10px",
                  backgroundColor: isLatest ? "rgba(201,146,42,0.08)" : "rgba(255,255,255,0.035)",
                  border: `1px solid ${isLatest ? "rgba(201,146,42,0.35)" : "rgba(255,255,255,0.08)"}`,
                  borderLeft: `4px solid ${book.spineColor}`,
                  borderRadius: "8px", padding: "9px 11px 9px 9px",
                }}>
                  <div style={{ width: "36px", height: "36px", borderRadius: "50%", backgroundColor: book.spineColor, display: "flex", alignItems: "center", justifyContent: "center", fontSize: "18px", flexShrink: 0, boxShadow: "0 2px 8px rgba(0,0,0,0.4)" }}>
                    {book.emoji}
                  </div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: "5px", marginBottom: "2px" }}>
                      <span style={{ color: AMBER, fontFamily: "'Playfair Display', serif", fontSize: "10px", fontWeight: 700 }}>
                        {childName}{age !== null ? ` · Age ${age}` : ""}
                      </span>
                      {isNew && <span style={{ backgroundColor: AMBER, color: NAVY, fontSize: "6px", fontWeight: 800, borderRadius: "4px", padding: "1px 4px", letterSpacing: "0.05em" }}>NEW</span>}
                    </div>
                    <div style={{ color: CREAM, fontFamily: "'Merriweather', serif", fontSize: "9px", fontStyle: "italic", marginBottom: "1px", lineHeight: 1.3 }}>{book.title}</div>
                    <div style={{ color: "rgba(247,240,227,0.4)", fontFamily: "'DM Sans', sans-serif", fontSize: "7.5px" }}>
                      {formatSessionDate(entry.sessionDate)}{pagesRead > 0 ? ` · ${pagesRead} page${pagesRead !== 1 ? "s" : ""} read` : ""}

                  <button style={{ backgroundColor: "rgba(255,255,255,0.07)", border: "1px solid rgba(255,255,255,0.12)", borderRadius: "6px", padding: "5px 8px", color: "rgba(247,240,227,0.5)", fontFamily: "'DM Sans', sans-serif", fontSize: "8px", fontWeight: 700, cursor: "default", flexShrink: 0 }}>

    }

    /* Device Frame */
    function DeviceFrame({ label, isNana, displayPage, flipping, flipFromPage, flipToPage, flipDirection, mode, promptIndex, childPromptIndex, showAndTellPromptIndex, myFilter, theirFilter, onSetMyFilter, sillyChallenge, sillyCountNum, onStartChallenge, laughWinner, onLaughedFirst, onStartChat, onStartReading, onNextPrompt, onNextChildPrompt, onStartShowAndTell, onNextShowAndTellPrompt, onBackToReading, onStartParentCheck, onStartSillyFaces, onBackFromSillyFaces, goodbyePhase, onStartGoodbye, onSkipToGoodbye, onEndSession, showConsentOverlay, recordingOn, onToggleRecording, onDismissConsent, isRecording, scheduleProposal, myScheduleAccepted, otherScheduleAccepted, onPropose, onScheduleAccept, selectedBookId, onSelectBook, onConfirmBook, bookPages, onboardingStep, nanaDisplayName, inviteToken, authError, authLoading, perryInviteError, perryLookupNanaName, onNanaAuth, onNanaCodeSent, onPerryCodeSubmit, onChildProfileConfirm, onBeginSession, onSkipOnboarding, onOnboardingBack, phaseIntro, onDismissPhaseCard, onDisablePhaseCard, perryPinMode, perryPinChildName, perryPinError, perryPinLoading, onPerryPinLogin, showChildIcebreakerPrompts = false, onToggleChildIcebreakerPrompts, dashboardLoading = false, dashboardPerryName = "", dashboardProgress = [], onOpenVault, onCloseVault, vaultConnectionId, onSwipePrev, onSwipeNext, fontScale = 1 }) {
      const isOnboarding  = mode === "onboarding";
      const isChatMode    = mode === "chat";
      const isIcebreaker  = mode === "icebreaker";
      const isLibrary     = mode === "library";
      const isShowAndTell = mode === "showandtell";
      const isParentCheck = mode === "parentcheck";
      const isSillyFaces  = mode === "sillyfaces";
      const isGoodbyeMode = mode === "goodbye";
      const isVault       = mode === "vault";
      const modeHighlight = (isChatMode || isIcebreaker || isLibrary || isShowAndTell || isParentCheck || isSillyFaces || isGoodbyeMode || isVault) && !isOnboarding;
      const modeLabel = isOnboarding ? "Setting Up" : isIcebreaker ? "Getting Started" : isLibrary ? "Book Library 📚" : isChatMode ? "Chat Mode" : isShowAndTell ? "Show & Tell" : isParentCheck ? "Quick Check-In 💬" : isSillyFaces ? "Silly Faces 🎭" : isGoodbyeMode ? "Goodbye 💕" : isVault ? "Memory Vault 📼" : "Reading Mode";
      return (
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", flex: 1, minWidth: 0, height: "100%" }}>
          <p style={{ color: CREAM, fontFamily: "'DM Sans', sans-serif", fontSize: "10px", fontWeight: 700, letterSpacing: "0.12em", marginBottom: "3px", opacity: 0.6 }}>
            {label}
          </p>
          <div style={{
            border: "3px solid rgba(255,255,255,0.14)", borderRadius: "20px",
            backgroundColor: "#0b172e",
            boxShadow: "0 10px 40px rgba(0,0,0,0.7), inset 0 0 0 1px rgba(255,255,255,0.06)",
            width: "100%", display: "flex", flexDirection: "column",
            overflow: "hidden", flex: 1, position: "relative",
          }}>
            {/* Top bar */}
            <div style={{
              backgroundColor: "#060e1c", padding: "3px 10px", display: "flex",

              <div style={{ flex: 1, display: "flex", alignItems: "center", gap: "5px" }}>

              <span style={{ color: modeHighlight ? AMBER : CREAM, fontFamily: "'DM Sans', sans-serif", fontSize: "9px", opacity: modeHighlight ? 1 : 0.4, flex: 1, textAlign: "center", fontWeight: modeHighlight ? 700 : 400 }}>

                {modeHighlight ? (
                  <>
                    <button onClick={isVault ? onCloseVault : onOpenVault} style={{ width: "24px", height: "24px", borderRadius: "50%", backgroundColor: isVault ? "rgba(201,146,42,0.25)" : "rgba(255,255,255,0.1)", border: "none", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "11px", cursor: "pointer" }} title={isVault ? "Close Vault" : "Memory Vault"}>

                    <div style={{ width: "24px", height: "24px", borderRadius: "50%", backgroundColor: "rgba(255,255,255,0.1)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "11px" }}>☰</div>

              ? <OnboardingView isNana={isNana} step={onboardingStep} nanaDisplayName={nanaDisplayName} inviteToken={inviteToken} authError={authError} authLoading={authLoading} perryInviteError={perryInviteError} perryLookupNanaName={perryLookupNanaName} onNanaAuth={onNanaAuth} onNanaCodeSent={onNanaCodeSent} onPerryCodeSubmit={onPerryCodeSubmit} onChildProfileConfirm={onChildProfileConfirm} onBeginSession={onBeginSession} onSkip={onSkipOnboarding} onBack={onOnboardingBack} perryPinMode={perryPinMode} perryPinChildName={perryPinChildName} perryPinError={perryPinError} perryPinLoading={perryPinLoading} onPerryPinLogin={onPerryPinLogin} dashboardLoading={dashboardLoading} dashboardPerryName={dashboardPerryName} dashboardProgress={dashboardProgress} />

                : isParentCheck

                : isGoodbyeMode
                  ? <GoodbyeView isNana={isNana} goodbyePhase={goodbyePhase} onSkipToGoodbye={onSkipToGoodbye} onEndSession={onEndSession} />
                  : isChatMode
                    ? <ChatModeView isNana={isNana} nanaPromptText={bookPages[displayPage - 1].nanaPrompt} onStartReading={onBackToReading} bookEmoji={bookPages[0].leftEmoji} bookTitle={bookPages[0].rightTitle} />
                    : <BookSpread displayPage={displayPage} isNana={isNana} flipping={flipping} flipFromPage={flipFromPage} flipToPage={flipToPage} flipDirection={flipDirection} onStartChat={onStartChat} bookPages={bookPages} bookTitle={bookPages[0]?.rightTitle || ""} onSwipePrev={onSwipePrev} onSwipeNext={onSwipeNext} fontScale={fontScale} />
            }
            {showConsentOverlay && !isOnboarding && (
              <RecordingConsentOverlay isNana={isNana} recordingOn={recordingOn} onToggleRecording={onToggleRecording} onDismiss={onDismissConsent} />
            )}
          </div>
        </div>
      );
    }
