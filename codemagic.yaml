# Codemagic build pipeline for the NeverMiss iOS app.
#
# One-time setup on codemagic.io after connecting the GitHub repo:
#
# 1. Team Integrations → App Store Connect → "+ Add new":
#      Name:       nevermiss-asc        # must match `integrations.app_store_connect` below
#      Issuer ID:  <from App Store Connect → Users and Access → Keys page>
#      Key ID:     <from the same page, your key row>
#      API key:    upload the .p8 file
#
# 2. Code signing certificates: nothing to upload by hand — Codemagic
#    auto-generates and renews the iOS distribution cert using the
#    integration above.
#
# 3. App Store Connect: confirm bundle ID `family.nevermiss.app` is
#    registered (it is) AND the app entry exists (it does).
#
# Every push to `main` triggers this workflow → archive → TestFlight upload.

workflows:
  ios-testflight:
    name: NeverMiss iOS → TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60

    # ── Link this workflow to the named App Store Connect integration. ──
    # The name on the RIGHT side must EXACTLY match the integration name
    # you created in Codemagic UI (step 1 in the comment above). Without
    # this link, publishing.auth=integration errors out with the validation
    # error you just saw.
    integrations:
      app_store_connect: nevermiss-asc

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: family.nevermiss.app
      vars:
        BUNDLE_ID: family.nevermiss.app
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
        # Drives the Vite production build to call the live api host
        # instead of the dev localhost proxy.
        VITE_API_BASE: "https://api.nevermiss.family/api"
        NODE_ENV: production
        PORT: "5173"
        BASE_PATH: "/"
      # Vite 7.x requires Node >= 20.19 or >= 22.12. Codemagic's
      # default "20.18.0" alias fails the Vite preflight check with
      # "Vite requires Node.js version 20.19+ or 22.12+". Pin to a
      # 22.x LTS that's known good with Vite + Capacitor + esbuild.
      node: 22.12.0
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Install pnpm
        script: |
          # Codemagic's macOS image ships pnpm via corepack on Node 20.18,
          # but that corepack version (v0.29) has a stale trusted-keys
          # list and fails to verify pnpm's signature with:
          #   Error: Cannot find matching keyid ...
          # Update corepack to v0.31+ (which has current keys), then
          # pin pnpm 10 explicitly so the install doesn't have to fetch
          # the "latest" record from the npm registry.
          npm install -g corepack@latest --force
          corepack enable
          corepack prepare pnpm@10.13.1 --activate
          echo "pnpm: $(pnpm -v)"
          echo "node: $(node -v)"

      - name: Install JS deps
        script: |
          # COREPACK_ENABLE_STRICT=0 stops corepack from walking up the
          # filesystem looking for a `packageManager` field. The macOS
          # build image has `/Users/builder/package.json` declaring
          # yarn, which intercepts pnpm calls even when pnpm is on PATH.
          # Combined with the `packageManager` field we set in
          # nevermiss/package.json, this guarantees pnpm gets used.
          export COREPACK_ENABLE_STRICT=0
          pnpm install --no-frozen-lockfile

      - name: Build the SPA for production
        script: |
          pnpm build

      - name: Copy SPA into the iOS project
        script: |
          npx cap copy ios
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install

      - name: Set up code signing
        script: |
          set -e
          keychain initialize

          # fetch-signing-files with --create handles BOTH:
          #   - generating a fresh private key + creating an iOS
          #     Distribution certificate that uses it
          #   - downloading (or creating) the App Store provisioning
          #     profile bound to that cert + the bundle ID
          # The previous explicit `certificates create` step failed with
          # "Cannot create resource without certificate private key"
          # because the CLI needs to bind the new cert to a private key
          # it has access to — which fetch-signing-files generates
          # internally when given --create.
          #
          # The App ID, an existing iOS Distribution certificate, and a
          # manually-created provisioning profile are all now in place
          # at developer.apple.com, so this finds them and downloads
          # them into the keychain without creating duplicates.
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --platform IOS \
            --create

          keychain add-certificates
          xcode-project use-profiles

      - name: Increment build number (TestFlight uploads need unique build #)
        script: |
          cd ios/App
          LATEST_BUILD=$(app-store-connect get-latest-app-store-build-number "$BUNDLE_ID" || echo "0")
          NEW_BUILD=$((LATEST_BUILD + 1))
          agvtool new-version -all $NEW_BUILD
          echo "→ build number = $NEW_BUILD"

      - name: Archive + export .ipa
        script: |
          cd ios/App
          xcode-project build-ipa \
            --workspace "App.xcworkspace" \
            --scheme "App"

    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - ios/App/build/ios/xcarchive

    publishing:
      app_store_connect:
        auth: integration
        # Submit to TestFlight (internal testers) but NOT to App Store
        # review automatically. Promote to review manually from App Store
        # Connect once you've tested.
        submit_to_testflight: true
        # If you've created a Beta Group named "Internal Testers" in
        # App Store Connect, uncomment this. Otherwise Codemagic uploads
        # to TestFlight without auto-assigning a group.
        # beta_groups:
        #   - Internal Testers
        submit_to_app_store: false
      email:
        recipients:
          - malikameerhamza2010@gmail.com   # change if you want a different inbox
        notify:
          success: true
          failure: true
